syntax = "proto3";

option go_package = "github.com/roundinternetmoney/proto-dex;pb";

package base.v1;

import "base/v1/book.proto";
import "base/v1/position.proto";
import "base/v1/account.proto";
import "base/v1/asset.proto";

enum Dex {
  DEX_UNSPECIFIED = 0;
  DEX_ASTER = 1;
  DEX_ETHEREAL = 2;
  DEX_HYPERLIQUID = 3;
  DEX_BINANCE = 4;
  DEX_BYBIT = 5;
  DEX_HTX = 6;
}

message DexEnvelope {
  Dex dex = 1;
  uint64 sequence = 2;
  int64 ts = 3;
  oneof payload {
    BookDiff diff = 4;
    PositionSnapshot pos = 5;
    MarginSnapshot margin = 6;
    AssetBaseSnapshot asset = 7;
    Mids mids = 8;
  }
}