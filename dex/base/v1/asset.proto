syntax = "proto3";

option go_package = "github.com/roundinternetmoney/proto-dex;pb";

package base.v1;

message Asset {
  string ticker = 1;
  string id = 2;
  double min_quantity = 12;
  double max_quantity = 13;
  double lot_size = 14;
  double tick_size = 15;
}

message AssetSnapshot {
    repeated Asset a = 1;
}